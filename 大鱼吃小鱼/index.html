<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大鱼吃小鱼</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <div class="hud">
      <div class="title">大鱼吃小鱼</div>
      <div class="info">得分: <span id="score">0</span> · 游戏等级: <span id="level">1</span></div>
      <div class="player-info">主鱼等级: <span id="playerLevel">1</span> / 4</div>
      <div class="goal">
        <div class="goal-title">胜利目标</div>
        <div class="goal-preview">
          <img id="goalFish" src="4.png" alt="最大的鱼" />
        </div>
        <div class="goal-text">吃掉最大的鱼即可获胜</div>
      </div>
      <div class="hint">用鼠标移动主鱼，吃比你小的鱼，躲避更大的鱼。</div>
    </div>
    <canvas id="gameCanvas" width="1024" height="640"></canvas>
    <div class="overlay hidden" id="overlay">
      <div class="overlay-content">
        <h1 id="overlayTitle">准备好了吗？</h1>
        <p id="overlayText">点击开始游戏</p>
        <button id="startButton">开始游戏</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
